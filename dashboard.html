<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — larp.ai</title>
    <style>
        /* @ts-nocheck */
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--bg:#080808;--card:#111;--card2:#161616;--border:rgba(255,255,255,0.08);--green:#30d158;--orange:#ff9f0a;--red:#ff453a;--blue:#5ac8fa;--dim:rgba(255,255,255,0.38);--faint:rgba(255,255,255,0.18);}
        [data-theme="light"]{
            --bg:#f5f5f0;--card:#e8e8e4;--card2:#dededA;
            --border:rgba(0,0,0,0.08);--green:#1a8c38;--orange:#b8960a;
            --red:#d63329;--blue:#0077a8;--dim:rgba(10,10,12,0.5);--faint:rgba(10,10,12,0.2);
        }
        [data-theme="light"] body{color:#0a0a0c;}
        body{
            font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
            background:var(--bg);color:#fff;min-height:100vh;overflow-x:hidden;
            transition:background 0.3s ease,color 0.3s ease;
        }
        [data-theme="light"] body{color:#0a0a0c;}
        body::before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:0.02;pointer-events:none;z-index:0;}

        /* NAV */
        nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:rgba(8,8,8,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
        .nav-brand{font-family:"Syne",sans-serif;font-size:17px;font-weight:800;letter-spacing:-.04em;color:#fff;text-decoration:none;}
        .nav-brand em{font-weight:300;font-style:italic;color:rgba(255,255,255,0.25);font-size:11px;margin-left:4px;}
        .nav-right{display:flex;gap:8px;align-items:center;}
        .nav-name{font-size:13px;color:rgba(255,255,255,0.4);font-weight:500;}
        .nav-name b{color:#fff;}
        .nbtn{padding:7px 16px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;border:none;white-space:nowrap;}
        .nbtn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.12)!important;color:rgba(255,255,255,0.5);}
        .nbtn-ghost:hover{color:#fff;border-color:rgba(255,255,255,0.25)!important;}
        .nbtn-solid{background:#fff;color:#000;}
        .nbtn-solid:hover{background:rgba(255,255,255,0.88);}

        /* LAYOUT */
        .page{max-width:900px;margin:0 auto;padding:88px 20px 60px;}

        /* SECTION LABEL */
        .sec-label{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:14px;}

        /* CARD */
        .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;}
        .card+.card{margin-top:14px;}

        /* SCORE HERO WIDGET */
        .score-hero{text-align:center;padding:36px 24px 28px;position:relative;overflow:hidden;}
        .score-hero-glow{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 1s ease;}
        .score-ring-wrap{width:200px;height:200px;margin:0 auto 24px;position:relative;}
        .score-ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg);}
        .ring-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:8;}
        .ring-old{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:541;stroke-dashoffset:541;transition:stroke-dashoffset 1.8s cubic-bezier(.4,0,.2,1);overflow:visible;}
        .ring-new{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:565;stroke-dashoffset:565;transition:stroke-dashoffset 2s cubic-bezier(.4,0,.2,1) .3s;opacity:0;}
        .ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
        .score-num-big{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:44px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
        .score-denom{font-size:12px;color:rgba(255,255,255,0.3);margin-top:3px;}
        .score-label-big{font-family:"Syne",sans-serif;font-size:28px;font-weight:800;letter-spacing:.02em;margin-bottom:6px;}
        .score-pct{font-size:13px;font-weight:600;margin-bottom:4px;}
        .score-tip{font-size:12px;color:rgba(255,255,255,0.35);}

        /* COMPARE STRIP */
        .compare-strip{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
        .cmp-block{text-align:center;}
        .cmp-label{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:4px;}
        .cmp-val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;}
        .cmp-arrow{font-size:20px;color:rgba(255,255,255,0.2);}
        .cmp-delta{text-align:center;}
        .cmp-delta-val{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;}
        .cmp-delta-label{font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px;}

        /* NO IMPROVE MESSAGE */
        .no-improve{margin-top:18px;padding:14px 18px;background:rgba(255,159,10,0.07);border:1px solid rgba(255,159,10,0.2);border-radius:12px;font-size:13px;color:rgba(255,255,255,0.5);text-align:center;line-height:1.6;display:none;}

        /* PARTICLE CANVAS */
        #particleCanvas{position:absolute;inset:0;pointer-events:none;z-index:0;}

        /* IMPROVED FEATURES CAROUSEL */
        .carousel-wrap{position:relative;overflow:hidden;}
        .carousel-track{display:flex;gap:12px;transition:transform .5s cubic-bezier(.4,0,.2,1);}
        .carousel-slide{min-width:calc(50% - 6px);background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:18px;}
        /* SCORE GRAPH */
        .graph-wrap{position:relative;width:100%;height:180px;margin-top:8px;}
        .graph-wrap canvas{width:100%;height:100%;}
        .graph-tooltip{position:absolute;background:#1a1a1a;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;color:#fff;pointer-events:none;white-space:nowrap;display:none;z-index:10;}

        /* FEATURE GRAPH */
        .feat-graph-wrap{position:relative;width:100%;height:220px;margin-top:8px;overflow:hidden;}
        .feat-legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:10px;}
        .feat-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,0.45);cursor:pointer;}
        .feat-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

        @media(max-width:600px){.carousel-slide{min-width:calc(100% - 0px);}}
        .slide-feature{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
        .slide-scores{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
        .slide-old{font-size:22px;font-weight:700;color:rgba(255,255,255,0.3);font-variant-numeric:tabular-nums;}
        .slide-arrow{font-size:16px;color:rgba(255,255,255,0.2);}
        .slide-new{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;}
        .slide-delta{font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block;}
        .slide-delta.up{background:rgba(48,209,88,0.12);color:#30d158;}
        .slide-delta.down{background:rgba(255,69,58,0.12);color:#ff453a;}
        .carousel-dots{display:flex;justify-content:center;gap:6px;margin-top:14px;}
        .carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);transition:all .3s;cursor:pointer;}
        .carousel-dot.active{width:18px;border-radius:3px;background:#fff;}

        /* FIX GUIDE ACCORDION */
        .fix-item{border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:8px;}
        .fix-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s;}
        .fix-header:hover{background:rgba(255,255,255,0.03);}
        .fix-left{display:flex;align-items:center;gap:12px;}
        .fix-score-badge{font-size:14px;font-weight:700;min-width:32px;text-align:center;}
        .fix-name{font-size:13px;font-weight:600;color:rgba(255,255,255,0.8);}
        .fix-chevron{font-size:12px;color:rgba(255,255,255,0.25);transition:transform .25s;}
        .fix-chevron.open{transform:rotate(180deg);}
        .fix-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1);}
        .fix-body.open{max-height:9999px;}
        .fix-content{padding:0 18px 16px;font-size:12px;color:rgba(255,255,255,0.45);line-height:1.7;white-space:pre-line;}

        /* HISTORY */
        .hist-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--card2);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;}
        .hist-score{font-size:26px;font-weight:800;min-width:52px;font-variant-numeric:tabular-nums;}
        .hist-info{flex:1;}
        .hist-label{font-size:13px;font-weight:700;}
        .hist-meta{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px;}
        .hist-num{font-size:11px;color:rgba(255,255,255,0.15);}

        /* COMPOSITES GRID */
        .comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .comp-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
        .comp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
        .comp-name{font-size:12px;font-weight:700;color:rgba(255,255,255,0.6);}
        .comp-val{font-size:16px;font-weight:800;}
        .comp-bar-bg{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
        .comp-bar-fill{height:100%;border-radius:2px;transition:width 1.2s ease .5s;}
        .comp-desc{font-size:10px;color:rgba(255,255,255,0.22);margin-top:5px;}

        /* ACTION BUTTONS */
        .action-row{display:flex;gap:12px;margin-bottom:14px;}
        .action-btn{flex:1;padding:14px;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;border:none;letter-spacing:-.01em;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;}
        .action-primary{background:#fff;color:#000;}
        .action-primary:hover{background:rgba(255,255,255,0.88);transform:translateY(-1px);}
        .action-secondary{background:rgba(255,255,255,0.07);border:1px solid var(--border)!important;color:rgba(255,255,255,0.7);}
        .action-secondary:hover{background:rgba(255,255,255,0.12);color:#fff;}

        /* ANIMATIONS */
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes popIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .fade-up{opacity:0;animation:fadeUp .5s ease forwards;}
        .d1{animation-delay:.1s}
        .d2{animation-delay:.2s}
        .d3{animation-delay:.3s}
        .d4{animation-delay:.4s}
        .d5{animation-delay:.5s}
        .d6{animation-delay:.6s}
        .d7{animation-delay:.7s}

        @media(max-width:600px){
            nav{padding:13px 16px;}
            .page{padding:76px 14px 50px;}
            .comp-grid{grid-template-columns:1fr 1fr;}
            .action-row{flex-direction:column;}
            .score-num-big{font-size:44px;}
        }
    </style>
</head>
<body>

<nav>
    <a href="home.html" class="nav-brand">larp.ai <em>v4.4</em></a>
    <div class="nav-right">
        <span class="nav-name" id="navName"></span>
        <button id="dashThemeToggle" style="width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:rgba(255,255,255,0.05);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:rgba(255,255,255,0.5);" title="Toggle theme">🌙</button>
        <a href="app.html" class="nbtn nbtn-solid">+ New Analysis</a>
        <button class="nbtn nbtn-ghost" onclick="LarpAuth.logout()">Log Out</button>
    </div>
</nav>

<div class="page" id="page">
    <!-- content injected by JS -->
    <div style="text-align:center;padding:80px 0;color:rgba(255,255,255,0.2);font-size:14px;">Loading your dashboard...</div>
</div>

<script src="auth.js"></script>
<script>
// @ts-nocheck
document.addEventListener('DOMContentLoaded', () => {
    // Apply theme
    const savedTheme = localStorage.getItem('larp_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    const dTBtn = document.getElementById('dashThemeToggle');
    if (dTBtn) {
        dTBtn.textContent = savedTheme === 'dark' ? '🌙' : '☀️';
        dTBtn.addEventListener('click', () => {
            const cur  = document.documentElement.getAttribute('data-theme');
            const next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('larp_theme', next);
            dTBtn.textContent = next === 'dark' ? '🌙' : '☀️';
        });
    }

    const auth = window.LarpAuth;

    // Guard: must be logged in
    if (!auth.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
    }

    const session = auth.currentUser();
    document.getElementById('navName').innerHTML = 'Hi, <b>' + session.name.split(' ')[0] + '</b>';

    const results = auth.getResults(); // newest first
    const page    = document.getElementById('page');

    if (results.length === 0) {
        page.innerHTML = buildEmpty();
        return;
    }

    const latest  = results[0];
    // Load saved potential score — fallback: calculate from oldest result's scores
    const potentialScore = (() => {
        try {
            const v = localStorage.getItem('larp_potential_' + session.email);
            if (v) return parseFloat(v);
            // Fallback: calculate from latest scores if not saved
            const s = latest.scores;
            if (!s) return null;
            const CEILING = 9.5;
            const ORDER_P = ['symmetry','goldenRatio','FWHR','midfaceRatio','eyeArea','zygomatic',
                'jawline','bizygoBigonial','nose','lips','maxilla','gonion','mandible',
                'temples','eyebrows','EMEangle','facialIndex','neoclassical'];
            let p = {};
            ORDER_P.forEach(k => { const c = s[k]??5; p[k] = c + (CEILING-c)*0.55; });
            const w = (pairs) => { let t=0,wt=0; pairs.forEach(([v,wt2])=>{t+=Math.min(10,Math.max(0,v))*wt2;wt+=wt2;}); return t/wt; };
            const pH = w([[p.symmetry,0.28],[p.goldenRatio,0.18],[p.FWHR,0.18],[p.midfaceRatio,0.18],[p.bizygoBigonial,0.18]]);
            const pA = w([[p.jawline,0.33],[p.zygomatic,0.27],[p.gonion,0.22],[p.mandible,0.18]]);
            const pD = w([[p.jawline,0.30],[p.FWHR,0.25],[p.eyebrows,0.20],[p.gonion,0.15],[p.eyeArea,0.10]]);
            const pM = w([[p.eyeArea,0.25],[p.nose,0.20],[p.lips,0.15],[p.temples,0.10],[p.EMEangle,0.15],[p.neoclassical,0.15]]);
            const calc = Math.min(9.8, pH*0.32 + pM*0.26 + pA*0.22 + pD*0.20);
            // Save it for next time
            localStorage.setItem('larp_potential_' + session.email, calc.toFixed(4));
            return calc;
        } catch { return null; }
    })();
    const prev    = results[1] || null;
    const isFirst = results.length === 1;

    // Check if we just came from an analysis (flag in sessionStorage)
    const justAnalysed  = sessionStorage.getItem('larp_just_analysed') === '1';
    const showImprove   = !isFirst && justAnalysed;
    if (justAnalysed) sessionStorage.removeItem('larp_just_analysed');

    // Score colour helper
    const sc = v => v >= 8 ? '#30d158' : v >= 6.5 ? '#ff9f0a' : v >= 5 ? '#ff6b35' : '#ff453a';

    // Feature order & names
    const FEATURES = [
        ['symmetry','Facial Symmetry'],['goldenRatio','Facial Thirds'],['FWHR','FWHR'],
        ['midfaceRatio','Midface Ratio'],['eyeArea','Eye Area'],['zygomatic','Zygomatic Arch'],
        ['jawline','Jawline'],['bizygoBigonial','Bizygo/Bigonial'],['nose','Nose'],
        ['lips','Lips'],['maxilla','Midface / Maxilla'],['gonion','Gonion'],
        ['mandible','Mandible'],['temples','Temples'],['eyebrows','Eyebrows'],
        ['EMEangle','EME Angle'],['facialIndex','Facial Index'],['neoclassical','Neoclassical Canons'],
    ];

    // Improvement data
    const improved = [];
    const declined = [];
    if (prev) {
        FEATURES.forEach(([k, name]) => {
            const nv = latest.scores[k] ?? 0;
            const pv = prev.scores[k] ?? 0;
            const d  = nv - pv;
            if (d > 0.05) improved.push({ k, name, nv, pv, d });
            else if (d < -0.05) declined.push({ k, name, nv, pv, d });
        });
        improved.sort((a,b) => b.d - a.d);
        declined.sort((a,b) => a.d - b.d);
    }

    const delta      = prev ? +(latest.overall - prev.overall).toFixed(3) : 0;
    const didImprove = delta > 0;

    // FIXES from scores (features under 5.5 with fix text stored? We reconstruct from KB)
    // We'll show all feature scores with their names, letting user expand each one
    // Sorted: worst first
    const fixItems = [...FEATURES]
        .map(([k, name]) => ({ k, name, v: latest.scores[k] ?? 0 }))
        .filter(f => f.v < 7.5)
        .sort((a,b) => a.v - b.v);

    // ─────────────────────────────────────────────
    // BUILD PAGE HTML
    // ─────────────────────────────────────────────
    page.innerHTML = `
        ${buildScoreHero(latest, prev, delta, didImprove, isFirst, sc, potentialScore)}
        ${buildDailyTip(latest, sc)}
        ${showImprove && improved.length > 0 ? buildImprovedCarousel(improved, sc) : ''}
        ${buildComposites(latest, sc)}
        ${buildWeeklyReport(results, sc)}
        ${buildScoreGraph(results, sc)}
        ${buildFeatureGraph(results, sc)}
        ${buildFixGuide(fixItems, sc)}
        ${buildHistory(results, sc)}
    `;

    // Wire composites bar animation
    setTimeout(() => {
        page.querySelectorAll('.comp-bar-fill[data-w]').forEach(el => {
            el.style.width = el.dataset.w + '%';
        });
    }, 300);

    // Wire carousel
    if (showImprove && improved.length > 0) initCarousel();

    // Wire graphs (after DOM renders)
    setTimeout(() => {
        initScoreGraph(results, sc);
        initFeatureGraph(results);
    }, 100);

    // Wire accordion
    page.querySelectorAll('.fix-header').forEach(h => {
        h.addEventListener('click', () => {
            const body    = h.nextElementSibling;
            const chevron = h.querySelector('.fix-chevron');
            const open    = body.classList.toggle('open');
            chevron.classList.toggle('open', open);
        });
    });

    // Score ring & animation
    const ringOld   = document.getElementById('ringOld');
    const ringNew   = document.getElementById('ringNew');
    const scoreNum  = document.getElementById('scoreNum');
    const C = 541;

    if (isFirst) {
        // First analysis: particles → score counts up
        const color = sc(latest.overall);
        ringOld.style.stroke = color;
        document.getElementById('scoreHeroGlow').style.background =
            `radial-gradient(ellipse 80% 60% at 50% 50%, ${color}22 0%, transparent 70%)`;
        document.getElementById('scoreHeroGlow').style.opacity = '1';

        setTimeout(() => {
            launchParticles(color, isFirst);
            setTimeout(() => {
                ringOld.style.strokeDashoffset = C - (latest.overall / 10) * C;
                countUp(scoreNum, 0, latest.overall, 2000);
            }, 800);
        }, 400);

    } else if (justAnalysed) {
        // Subsequent analysis: show old score, then animate to new
        const oldColor = sc(prev.overall);
        const newColor = sc(latest.overall);

        ringOld.style.stroke = oldColor;
        ringOld.style.strokeDashoffset = C - (prev.overall / 10) * C;
        ringOld.style.transition = 'none';
        scoreNum.textContent    = prev.overall.toFixed(3);
        scoreNum.style.color    = oldColor;

        document.getElementById('scoreHeroGlow').style.background =
            `radial-gradient(ellipse 80% 60% at 50% 50%, ${oldColor}20 0%, transparent 70%)`;
        document.getElementById('scoreHeroGlow').style.opacity = '1';

        setTimeout(() => {
            launchParticles(didImprove ? newColor : oldColor, false);
            setTimeout(() => {
                // Transition ring to new score
                ringOld.style.transition = 'stroke-dashoffset 1.8s cubic-bezier(.4,0,.2,1)';
                ringOld.style.stroke     = newColor;
                ringOld.style.strokeDashoffset = C - (latest.overall / 10) * C;

                // Count score number up/down
                countUp(scoreNum, prev.overall, latest.overall, 2000);
                scoreNum.style.color = newColor;

                document.getElementById('scoreHeroGlow').style.background =
                    `radial-gradient(ellipse 80% 60% at 50% 50%, ${newColor}22 0%, transparent 70%)`;

                // Show compare strip after animation
                setTimeout(() => {
                    const cs = document.getElementById('compareStrip');
                    if (cs) {
                        cs.style.transition = 'opacity .6s ease, transform .6s ease';
                        cs.style.opacity = '1';
                        cs.style.transform = 'translateY(0)';
                    }
                    // Show no-improve message if needed
                    if (!didImprove) {
                        const ni = document.getElementById('noImprove');
                        if (ni) ni.style.display = 'block';
                    }
                }, 2200);
            }, 900);
        }, 500);

    } else {
        // Returning visit — show static current score
        const color = sc(latest.overall);
        ringOld.style.stroke = color;
        ringOld.style.transition = 'none';
        setTimeout(() => {
            ringOld.style.transition = 'stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1)';
            ringOld.style.strokeDashoffset = C - (latest.overall / 10) * C;
            countUp(scoreNum, 0, latest.overall, 1400);
            scoreNum.style.color = color;
        }, 300);

        document.getElementById('scoreHeroGlow').style.background =
            `radial-gradient(ellipse 80% 60% at 50% 50%, ${color}20 0%, transparent 70%)`;
        document.getElementById('scoreHeroGlow').style.opacity = '1';

        if (prev) {
            setTimeout(() => {
                const cs = document.getElementById('compareStrip');
                if (cs) { cs.style.opacity = '1'; cs.style.transform = 'translateY(0)'; }
            }, 1800);
        }
    }
});

// ─── WEEKLY REPORT CARD ──────────────────────────────────────────────────
function buildWeeklyReport(results, sc) {
    if (results.length < 2) return '';
    const now = Date.now();
    const weekAgo = now - 7 * 24 * 60 * 60 * 1000;
    const thisWeek = results.filter(r => r.date >= weekAgo);
    const prevWeek = results.filter(r => r.date < weekAgo && r.date >= weekAgo - 7*24*60*60*1000);

    // Need at least one result this week
    if (thisWeek.length === 0) return '';

    const latest  = thisWeek[0];
    const oldest  = thisWeek[thisWeek.length - 1];
    const weekDelta = thisWeek.length > 1 ? +(latest.overall - oldest.overall).toFixed(3) : null;

    // Best/worst features this week vs last week
    const FEAT_KEYS_W = ['symmetry','goldenRatio','FWHR','midfaceRatio','eyeArea','zygomatic',
        'jawline','bizygoBigonial','nose','lips','maxilla','gonion','mandible',
        'temples','eyebrows','EMEangle','facialIndex','neoclassical'];
    const FEAT_NAMES_W = {
        symmetry:'Symmetry',goldenRatio:'Facial Thirds',FWHR:'FWHR',midfaceRatio:'Midface',
        eyeArea:'Eye Area',zygomatic:'Zygomatic',jawline:'Jawline',bizygoBigonial:'Bizygo/Bigonial',
        nose:'Nose',lips:'Lips',maxilla:'Maxilla',gonion:'Gonion',mandible:'Mandible',
        temples:'Temples',eyebrows:'Eyebrows',EMEangle:'EME Angle',facialIndex:'Facial Index',
        neoclassical:'Neoclassical',
    };

    // Compare latest this week vs best of prev week
    const prevBest = prevWeek.length > 0
        ? prevWeek.reduce((a,b) => a.overall > b.overall ? a : b)
        : null;

    const improved = [];
    const declined = [];
    if (prevBest) {
        FEAT_KEYS_W.forEach(k => {
            const nv = latest.scores?.[k] ?? 0;
            const pv = prevBest.scores?.[k] ?? 0;
            const d  = nv - pv;
            if (d > 0.05)  improved.push({ name: FEAT_NAMES_W[k], d: +d.toFixed(2) });
            if (d < -0.05) declined.push({ name: FEAT_NAMES_W[k], d: +d.toFixed(2) });
        });
        improved.sort((a,b) => b.d - a.d);
        declined.sort((a,b) => a.d - b.d);
    }

    const deltaStr   = weekDelta !== null ? (weekDelta >= 0 ? '+'+weekDelta : ''+weekDelta) : null;
    const deltaColor = weekDelta > 0 ? '#30d158' : weekDelta < 0 ? '#ff453a' : '#ff9f0a';
    const grade      = latest.overall >= 8 ? 'S' : latest.overall >= 7 ? 'A' : latest.overall >= 6 ? 'B' : latest.overall >= 5 ? 'C' : 'D';
    const gradeColor = latest.overall >= 7 ? '#30d158' : latest.overall >= 5 ? '#ff9f0a' : '#ff453a';

    const improvStr = improved.slice(0,3).map(f =>
        `<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
            <span style="color:rgba(255,255,255,0.55);">${f.name}</span>
            <span style="color:#30d158;font-weight:700;">+${f.d}</span>
        </div>`).join('');

    const declineStr = declined.slice(0,2).map(f =>
        `<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
            <span style="color:rgba(255,255,255,0.55);">${f.name}</span>
            <span style="color:#ff453a;font-weight:700;">${f.d}</span>
        </div>`).join('');

    const weekStr = thisWeek.length === 1 ? '1 analysis' : thisWeek.length + ' analyses';

    return `<div class="card fade-up d5" style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div class="sec-label" style="margin-bottom:0;">This Week's Report</div>
            <div style="display:flex;align-items:center;gap:10px;">
                <div style="font-size:10px;color:rgba(255,255,255,0.25);">${weekStr}</div>
                <div style="width:40px;height:40px;border-radius:10px;background:${gradeColor}18;border:2px solid ${gradeColor};display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:${gradeColor};">${grade}</div>
            </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;">
            <div style="text-align:center;background:rgba(255,255,255,0.03);border-radius:10px;padding:10px;">
                <div style="font-size:10px;color:rgba(255,255,255,0.25);margin-bottom:4px;text-transform:uppercase;letter-spacing:.1em;">Best</div>
                <div style="font-size:18px;font-weight:800;color:${sc(latest.overall)};">${latest.overall.toFixed(3)}</div>
            </div>
            <div style="text-align:center;background:rgba(255,255,255,0.03);border-radius:10px;padding:10px;">
                <div style="font-size:10px;color:rgba(255,255,255,0.25);margin-bottom:4px;text-transform:uppercase;letter-spacing:.1em;">Analyses</div>
                <div style="font-size:18px;font-weight:800;color:rgba(255,255,255,0.7);">${thisWeek.length}</div>
            </div>
            <div style="text-align:center;background:rgba(255,255,255,0.03);border-radius:10px;padding:10px;">
                <div style="font-size:10px;color:rgba(255,255,255,0.25);margin-bottom:4px;text-transform:uppercase;letter-spacing:.1em;">Week Δ</div>
                <div style="font-size:18px;font-weight:800;color:${deltaColor};">${deltaStr !== null ? deltaStr : '—'}</div>
            </div>
        </div>

        ${improved.length > 0 ? `
        <div style="margin-bottom:12px;">
            <div style="font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#30d158;margin-bottom:6px;">↑ Improved vs Last Week</div>
            ${improvStr}
        </div>` : ''}

        ${declined.length > 0 ? `
        <div>
            <div style="font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#ff453a;margin-bottom:6px;">↓ Declined vs Last Week</div>
            ${declineStr}
        </div>` : ''}

        ${prevWeek.length === 0 ? `<div style="font-size:12px;color:rgba(255,255,255,0.25);text-align:center;padding:8px 0;">No previous week data to compare yet.</div>` : ''}
    </div>`;
}

function buildScoreGraph(results, sc) {
    if (results.length < 2) return '';
    return `<div class="card fade-up d6" style="margin-bottom:14px;">
        <div class="sec-label" style="margin-bottom:4px;">Score Over Time</div>
        <div class="graph-wrap">
            <canvas id="scoreGraphCanvas"></canvas>
            <div class="graph-tooltip" id="scoreGraphTooltip"></div>
        </div>
    </div>`;
}

function initScoreGraph(results, sc) {
    const canvas = document.getElementById('scoreGraphCanvas');
    if (!canvas || results.length < 2) return;
    const tooltip = document.getElementById('scoreGraphTooltip');
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.parentElement.offsetWidth;
    const H = 180;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // results newest first — reverse for chronological
    const pts = [...results].reverse();
    const scores = pts.map(r => r.overall);
    const minS = Math.max(0, Math.min(...scores) - 0.5);
    const maxS = Math.min(10, Math.max(...scores) + 0.5);
    const pad = { t:16, r:16, b:32, l:36 };
    const gW = W - pad.l - pad.r;
    const gH = H - pad.t - pad.b;

    const px = (i) => pad.l + (i / (pts.length - 1)) * gW;
    const py = (v) => pad.t + (1 - (v - minS) / (maxS - minS)) * gH;

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
        const y = pad.t + (i / 4) * gH;
        ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
        const val = maxS - (i / 4) * (maxS - minS);
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.font = '9px -apple-system,sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(val.toFixed(1), pad.l - 4, y + 3);
    }

    // Gradient fill under line
    const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + gH);
    grad.addColorStop(0, 'rgba(48,209,88,0.25)');
    grad.addColorStop(1, 'rgba(48,209,88,0)');
    ctx.beginPath();
    ctx.moveTo(px(0), py(scores[0]));
    for (let i = 1; i < pts.length; i++) {
        const cpx = (px(i-1) + px(i)) / 2;
        ctx.bezierCurveTo(cpx, py(scores[i-1]), cpx, py(scores[i]), px(i), py(scores[i]));
    }
    ctx.lineTo(px(pts.length-1), pad.t + gH);
    ctx.lineTo(px(0), pad.t + gH);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Line
    ctx.beginPath();
    ctx.moveTo(px(0), py(scores[0]));
    for (let i = 1; i < pts.length; i++) {
        const cpx = (px(i-1) + px(i)) / 2;
        ctx.bezierCurveTo(cpx, py(scores[i-1]), cpx, py(scores[i]), px(i), py(scores[i]));
    }
    ctx.strokeStyle = '#30d158';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Dots + date labels
    pts.forEach((r, i) => {
        const x = px(i), y = py(scores[i]);
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI*2);
        ctx.fillStyle = sc(scores[i]);
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Date label
        const d = new Date(r.date);
        const label = d.getDate() + '/' + (d.getMonth()+1);
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.font = '9px -apple-system,sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(label, x, H - 6);
    });

    // Hover tooltip
    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        let closest = 0, minDist = Infinity;
        pts.forEach((_, i) => {
            const dist = Math.abs(mx - px(i));
            if (dist < minDist) { minDist = dist; closest = i; }
        });
        if (minDist < 30) {
            const r = pts[closest];
            const d = new Date(r.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
            tooltip.style.display = 'block';
            tooltip.style.left = (px(closest) - 40) + 'px';
            tooltip.style.top  = (py(scores[closest]) - 36) + 'px';
            tooltip.innerHTML = `<span style="color:${sc(scores[closest])}">${scores[closest].toFixed(3)}</span> <span style="color:rgba(255,255,255,0.35);font-weight:400">${d}</span>`;
        } else {
            tooltip.style.display = 'none';
        }
    });
    canvas.addEventListener('mouseleave', () => tooltip.style.display = 'none');
}

// ─── FEATURE GRAPH ────────────────────────────────────────────────────────
const FEAT_KEYS = ['symmetry','goldenRatio','FWHR','midfaceRatio','eyeArea','zygomatic',
    'jawline','bizygoBigonial','nose','lips','maxilla','gonion','mandible',
    'temples','eyebrows','EMEangle','facialIndex','neoclassical'];
const FEAT_NAMES = {
    symmetry:'Symmetry',goldenRatio:'Thirds',FWHR:'FWHR',midfaceRatio:'Midface',
    eyeArea:'Eyes',zygomatic:'Zygomatic',jawline:'Jawline',bizygoBigonial:'Bizygo/Big',
    nose:'Nose',lips:'Lips',maxilla:'Maxilla',gonion:'Gonion',mandible:'Mandible',
    temples:'Temples',eyebrows:'Brows',EMEangle:'EME',facialIndex:'Facial Idx',neoclassical:'Neoclassical',
};
const FEAT_COLORS = [
    '#30d158','#5ac8fa','#ff9f0a','#ff453a','#bf5af2','#ff6b35','#ffd60a',
    '#0af5a0','#ff375f','#00c7be','#32ade6','#ff6961','#ffb340','#30b0c7',
    '#ac8e68','#636366','#aeaeb2','#e5e5ea'
];

function buildFeatureGraph(results, sc) {
    if (results.length < 2) return '';
    return `<div class="card fade-up d7" style="margin-bottom:14px;">
        <div class="sec-label" style="margin-bottom:4px;">Feature Progress</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.25);margin-bottom:8px;">Each line = one feature. Tap legend to toggle.</div>
        <div class="feat-graph-wrap">
            <canvas id="featGraphCanvas"></canvas>
        </div>
        <div class="feat-legend" id="featLegend"></div>
    </div>`;
}

function initFeatureGraph(results) {
    const canvas = document.getElementById('featGraphCanvas');
    if (!canvas || results.length < 2) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.parentElement.offsetWidth;
    const H = 220;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';

    const pts = [...results].reverse();
    const hidden = new Set();

    const draw = () => {
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, W, H);

        const pad = { t:12, r:12, b:28, l:28 };
        const gW = W - pad.l - pad.r;
        const gH = H - pad.t - pad.b;
        const px = (i) => pad.l + (i / (pts.length - 1)) * gW;
        const py = (v) => pad.t + (1 - v / 10) * gH;

        // Grid
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 5; i++) {
            const y = pad.t + (i/5)*gH;
            ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W-pad.r, y); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            ctx.font = '8px -apple-system,sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText((10 - i*2).toString(), pad.l-3, y+3);
        }
        // Date labels
        pts.forEach((r, i) => {
            const d = new Date(r.date);
            const label = d.getDate() + '/' + (d.getMonth()+1);
            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            ctx.font = '8px -apple-system,sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(label, px(i), H - 6);
        });

        // Feature lines
        FEAT_KEYS.forEach((k, fi) => {
            if (hidden.has(k)) return;
            const col = FEAT_COLORS[fi];
            ctx.beginPath();
            ctx.strokeStyle = col;
            ctx.lineWidth = 1.5;
            ctx.globalAlpha = 0.8;
            pts.forEach((r, i) => {
                const v = r.scores?.[k] ?? 0;
                if (i === 0) ctx.moveTo(px(i), py(v));
                else {
                    const cpx = (px(i-1)+px(i))/2;
                    ctx.bezierCurveTo(cpx, py(pts[i-1].scores?.[k]??0), cpx, py(v), px(i), py(v));
                }
            });
            ctx.stroke();
            ctx.globalAlpha = 1;
        });
    };

    draw();

    // Legend
    const legend = document.getElementById('featLegend');
    if (legend) {
        FEAT_KEYS.forEach((k, fi) => {
            const item = document.createElement('div');
            item.className = 'feat-legend-item';
            item.innerHTML = `<div class="feat-legend-dot" style="background:${FEAT_COLORS[fi]};"></div><span>${FEAT_NAMES[k]}</span>`;
            item.addEventListener('click', () => {
                if (hidden.has(k)) { hidden.delete(k); item.style.opacity='1'; }
                else { hidden.add(k); item.style.opacity='0.3'; }
                draw();
            });
            legend.appendChild(item);
        });
    }
}

// ─── UTILITIES ───────────────────────────────────────────────────────────
function countUp(el, from, to, duration) {
    const start = Date.now();
    const tick  = () => {
        const t    = Math.min(1, (Date.now() - start) / duration);
        const ease = t < .5 ? 2*t*t : -1 + (4 - 2*t)*t;
        el.textContent = (from + (to - from) * ease).toFixed(3);
        if (t < 1) requestAnimationFrame(tick);
        else el.textContent = to.toFixed(3);
    };
    requestAnimationFrame(tick);
}

function launchParticles(color, burst) {
    const canvas = document.getElementById('particleCanvas');
    if (!canvas) return;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width  = rect.width;
    canvas.height = rect.height;
    const ctx = canvas.getContext('2d');

    // Parse color to rgba
    const hex = color.replace('#','');
    const r = parseInt(hex.slice(0,2),16);
    const g = parseInt(hex.slice(2,4),16);
    const b = parseInt(hex.slice(4,6),16);

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const count = burst ? 80 : 60;

    const particles = Array.from({length: count}, () => ({
        x: burst
            ? (Math.random() * canvas.width)
            : (Math.random() * canvas.width),
        y: burst
            ? (Math.random() * canvas.height)
            : (Math.random() < .5 ? 0 : canvas.height),
        size: Math.random() * 3 + 1,
        speedX: (Math.random() - .5) * (burst ? 3 : 2),
        speedY: burst
            ? (Math.random() - .5) * 3
            : ((cy - (Math.random() * canvas.height)) * .02),
        life: 1,
        decay: Math.random() * .008 + .004,
        // Target: center of ring
        tx: cx + (Math.random() - .5) * 20,
        ty: cy + (Math.random() - .5) * 20,
    }));

    let frame = 0;
    const animate = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        particles.forEach(p => {
            if (p.life <= 0) return;
            alive = true;
            // Pull toward target
            p.x += (p.tx - p.x) * .03 + p.speedX * .3;
            p.y += (p.ty - p.y) * .03 + p.speedY * .3;
            p.life -= p.decay;
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.shadowColor = `rgb(${r},${g},${b})`;
            ctx.shadowBlur  = 6;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });
        frame++;
        if (alive && frame < 300) requestAnimationFrame(animate);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
    };
    animate();
}

function initCarousel() {
    const track = document.getElementById('carouselTrack');
    const dots  = document.querySelectorAll('.carousel-dot');
    if (!track) return;

    const slides = track.querySelectorAll('.carousel-slide');
    const total  = slides.length;
    let cur = 0;

    const go = (i) => {
        cur = (i + total) % total;
        const slideW = slides[0].offsetWidth + 12;
        track.style.transform = `translateX(-${cur * slideW}px)`;
        dots.forEach((d, j) => d.classList.toggle('active', j === cur));
    };

    dots.forEach((d, i) => d.addEventListener('click', () => go(i)));

    // Auto advance
    let timer = setInterval(() => go(cur + 1), 3200);
    track.addEventListener('touchstart', () => clearInterval(timer), {passive:true});

    // Swipe support
    let sx = 0;
    track.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, {passive:true});
    track.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - sx;
        if (Math.abs(dx) > 40) { go(cur + (dx < 0 ? 1 : -1)); }
    });
}
