<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — larp.ai</title>
    <style>
        /* @ts-nocheck */
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--bg:#080808;--card:#111;--card2:#161616;--border:rgba(255,255,255,0.08);--green:#30d158;--orange:#ff9f0a;--red:#ff453a;--blue:#5ac8fa;--dim:rgba(255,255,255,0.38);--faint:rgba(255,255,255,0.18);}
        body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh;overflow-x:hidden;}

        /* NAV */
        nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:rgba(8,8,8,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
        .nav-brand{font-size:17px;font-weight:800;letter-spacing:-.03em;color:#fff;text-decoration:none;}
        .nav-brand em{font-weight:300;font-style:italic;color:rgba(255,255,255,0.25);font-size:11px;margin-left:4px;}
        .nav-right{display:flex;gap:8px;align-items:center;}
        .nav-name{font-size:13px;color:rgba(255,255,255,0.4);font-weight:500;}
        .nav-name b{color:#fff;}
        .nbtn{padding:7px 16px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;border:none;white-space:nowrap;}
        .nbtn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.12)!important;color:rgba(255,255,255,0.5);}
        .nbtn-ghost:hover{color:#fff;border-color:rgba(255,255,255,0.25)!important;}
        .nbtn-solid{background:#fff;color:#000;}
        .nbtn-solid:hover{background:rgba(255,255,255,0.88);}

        /* LAYOUT */
        .page{max-width:900px;margin:0 auto;padding:88px 20px 60px;}

        /* SECTION LABEL */
        .sec-label{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:14px;}

        /* CARD */
        .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;}
        .card+.card{margin-top:14px;}

        /* SCORE HERO WIDGET */
        .score-hero{text-align:center;padding:36px 24px 28px;position:relative;overflow:hidden;}
        .score-hero-glow{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 1s ease;}
        .score-ring-wrap{width:200px;height:200px;margin:0 auto 24px;position:relative;}
        .score-ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg);}
        .ring-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:8;}
        .ring-old{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:565;stroke-dashoffset:565;transition:stroke-dashoffset 1.8s cubic-bezier(.4,0,.2,1);}
        .ring-new{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:565;stroke-dashoffset:565;transition:stroke-dashoffset 2s cubic-bezier(.4,0,.2,1) .3s;opacity:0;}
        .ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
        .score-num-big{font-size:56px;font-weight:200;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.03em;}
        .score-denom{font-size:12px;color:rgba(255,255,255,0.3);margin-top:3px;}
        .score-label-big{font-size:28px;font-weight:900;letter-spacing:.04em;margin-bottom:6px;}
        .score-pct{font-size:13px;font-weight:600;margin-bottom:4px;}
        .score-tip{font-size:12px;color:rgba(255,255,255,0.35);}

        /* COMPARE STRIP */
        .compare-strip{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
        .cmp-block{text-align:center;}
        .cmp-label{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:4px;}
        .cmp-val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;}
        .cmp-arrow{font-size:20px;color:rgba(255,255,255,0.2);}
        .cmp-delta{text-align:center;}
        .cmp-delta-val{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;}
        .cmp-delta-label{font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px;}

        /* NO IMPROVE MESSAGE */
        .no-improve{margin-top:18px;padding:14px 18px;background:rgba(255,159,10,0.07);border:1px solid rgba(255,159,10,0.2);border-radius:12px;font-size:13px;color:rgba(255,255,255,0.5);text-align:center;line-height:1.6;display:none;}

        /* PARTICLE CANVAS */
        #particleCanvas{position:absolute;inset:0;pointer-events:none;z-index:0;}

        /* IMPROVED FEATURES CAROUSEL */
        .carousel-wrap{position:relative;overflow:hidden;}
        .carousel-track{display:flex;gap:12px;transition:transform .5s cubic-bezier(.4,0,.2,1);}
        .carousel-slide{min-width:calc(50% - 6px);background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:18px;}
        @media(max-width:600px){.carousel-slide{min-width:calc(100% - 0px);}}
        .slide-feature{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
        .slide-scores{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
        .slide-old{font-size:22px;font-weight:700;color:rgba(255,255,255,0.3);font-variant-numeric:tabular-nums;}
        .slide-arrow{font-size:16px;color:rgba(255,255,255,0.2);}
        .slide-new{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;}
        .slide-delta{font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block;}
        .slide-delta.up{background:rgba(48,209,88,0.12);color:#30d158;}
        .slide-delta.down{background:rgba(255,69,58,0.12);color:#ff453a;}
        .carousel-dots{display:flex;justify-content:center;gap:6px;margin-top:14px;}
        .carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);transition:all .3s;cursor:pointer;}
        .carousel-dot.active{width:18px;border-radius:3px;background:#fff;}

        /* FIX GUIDE ACCORDION */
        .fix-item{border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:8px;}
        .fix-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s;}
        .fix-header:hover{background:rgba(255,255,255,0.03);}
        .fix-left{display:flex;align-items:center;gap:12px;}
        .fix-score-badge{font-size:14px;font-weight:700;min-width:32px;text-align:center;}
        .fix-name{font-size:13px;font-weight:600;color:rgba(255,255,255,0.8);}
        .fix-chevron{font-size:12px;color:rgba(255,255,255,0.25);transition:transform .25s;}
        .fix-chevron.open{transform:rotate(180deg);}
        .fix-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
        .fix-body.open{max-height:600px;}
        .fix-content{padding:0 18px 16px;font-size:12px;color:rgba(255,255,255,0.45);line-height:1.7;white-space:pre-line;}

        /* HISTORY */
        .hist-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--card2);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;}
        .hist-score{font-size:26px;font-weight:800;min-width:52px;font-variant-numeric:tabular-nums;}
        .hist-info{flex:1;}
        .hist-label{font-size:13px;font-weight:700;}
        .hist-meta{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px;}
        .hist-num{font-size:11px;color:rgba(255,255,255,0.15);}

        /* COMPOSITES GRID */
        .comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .comp-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
        .comp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
        .comp-name{font-size:12px;font-weight:700;color:rgba(255,255,255,0.6);}
        .comp-val{font-size:16px;font-weight:800;}
        .comp-bar-bg{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
        .comp-bar-fill{height:100%;border-radius:2px;transition:width 1.2s ease .5s;}
        .comp-desc{font-size:10px;color:rgba(255,255,255,0.22);margin-top:5px;}

        /* ACTION BUTTONS */
        .action-row{display:flex;gap:12px;margin-bottom:14px;}
        .action-btn{flex:1;padding:14px;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;border:none;letter-spacing:-.01em;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;}
        .action-primary{background:#fff;color:#000;}
        .action-primary:hover{background:rgba(255,255,255,0.88);transform:translateY(-1px);}
        .action-secondary{background:rgba(255,255,255,0.07);border:1px solid var(--border)!important;color:rgba(255,255,255,0.7);}
        .action-secondary:hover{background:rgba(255,255,255,0.12);color:#fff;}

        /* ANIMATIONS */
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes popIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .fade-up{opacity:0;animation:fadeUp .5s ease forwards;}
        .d1{animation-delay:.1s}
        .d2{animation-delay:.2s}
        .d3{animation-delay:.3s}
        .d4{animation-delay:.4s}
        .d5{animation-delay:.5s}
        .d6{animation-delay:.6s}
        .d7{animation-delay:.7s}

        @media(max-width:600px){
            nav{padding:13px 16px;}
            .page{padding:76px 14px 50px;}
            .comp-grid{grid-template-columns:1fr 1fr;}
            .action-row{flex-direction:column;}
            .score-num-big{font-size:44px;}
        }
    </style>
</head>
<body>

<nav>
    <a href="home.html" class="nav-brand">larp.ai <em>v4.4</em></a>
    <div class="nav-right">
        <span class="nav-name" id="navName"></span>
        <a href="app.html" class="nbtn nbtn-solid">+ New Analysis</a>
        <button class="nbtn nbtn-ghost" onclick="LarpAuth.logout()">Log Out</button>
    </div>
</nav>

<div class="page" id="page">
    <!-- content injected by JS -->
    <div style="text-align:center;padding:80px 0;color:rgba(255,255,255,0.2);font-size:14px;">Loading your dashboard...</div>
</div>

<script src="auth.js"></script>
<script>
// @ts-nocheck
document.addEventListener('DOMContentLoaded', () => {
    const auth = window.LarpAuth;

    // Guard: must be logged in
    if (!auth.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
    }

    const session = auth.currentUser();
    document.getElementById('navName').innerHTML = 'Hi, <b>' + session.name.split(' ')[0] + '</b>';

    const results = auth.getResults(); // newest first
    const page    = document.getElementById('page');

    if (results.length === 0) {
        page.innerHTML = buildEmpty();
        return;
    }

    const latest  = results[0];
    const prev    = results[1] || null;
    const isFirst = results.length === 1;

    // Check if we just came from an analysis (flag in sessionStorage)
    const justAnalysed  = sessionStorage.getItem('larp_just_analysed') === '1';
    const showImprove   = !isFirst && justAnalysed;
    if (justAnalysed) sessionStorage.removeItem('larp_just_analysed');

    // Score colour helper
    const sc = v => v >= 8 ? '#30d158' : v >= 6.5 ? '#ff9f0a' : v >= 5 ? '#ff6b35' : '#ff453a';

    // Feature order & names
    const FEATURES = [
        ['symmetry','Facial Symmetry'],['goldenRatio','Facial Thirds'],['FWHR','FWHR'],
        ['midfaceRatio','Midface Ratio'],['eyeArea','Eye Area'],['zygomatic','Zygomatic Arch'],
        ['jawline','Jawline'],['bizygoBigonial','Bizygo/Bigonial'],['nose','Nose'],
        ['lips','Lips'],['maxilla','Midface / Maxilla'],['gonion','Gonion'],
        ['mandible','Mandible'],['temples','Temples'],['eyebrows','Eyebrows'],
        ['EMEangle','EME Angle'],['facialIndex','Facial Index'],['neoclassical','Neoclassical Canons'],
    ];

    // Improvement data
    const improved = [];
    const declined = [];
    if (prev) {
        FEATURES.forEach(([k, name]) => {
            const nv = latest.scores[k] ?? 0;
            const pv = prev.scores[k] ?? 0;
            const d  = nv - pv;
            if (d > 0.05) improved.push({ k, name, nv, pv, d });
            else if (d < -0.05) declined.push({ k, name, nv, pv, d });
        });
        improved.sort((a,b) => b.d - a.d);
        declined.sort((a,b) => a.d - b.d);
    }

    const delta      = prev ? +(latest.overall - prev.overall).toFixed(3) : 0;
    const didImprove = delta > 0;

    // FIXES from scores (features under 5.5 with fix text stored? We reconstruct from KB)
    // We'll show all feature scores with their names, letting user expand each one
    // Sorted: worst first
    const fixItems = [...FEATURES]
        .map(([k, name]) => ({ k, name, v: latest.scores[k] ?? 0 }))
        .filter(f => f.v < 7.5)
        .sort((a,b) => a.v - b.v);

    // ─────────────────────────────────────────────
    // BUILD PAGE HTML
    // ─────────────────────────────────────────────
    page.innerHTML = `
        ${buildScoreHero(latest, prev, delta, didImprove, isFirst, sc)}
        ${showImprove && improved.length > 0 ? buildImprovedCarousel(improved, sc) : ''}
        ${buildComposites(latest, sc)}
        ${buildFixGuide(fixItems, sc)}
        ${buildHistory(results, sc)}
    `;

    // Wire composites bar animation
    setTimeout(() => {
        page.querySelectorAll('.comp-bar-fill[data-w]').forEach(el => {
            el.style.width = el.dataset.w + '%';
        });
    }, 300);

    // Wire carousel
    if (showImprove && improved.length > 0) initCarousel();

    // Wire accordion
    page.querySelectorAll('.fix-header').forEach(h => {
        h.addEventListener('click', () => {
            const body    = h.nextElementSibling;
            const chevron = h.querySelector('.fix-chevron');
            const open    = body.classList.toggle('open');
            chevron.classList.toggle('open', open);
        });
    });

    // Score ring & animation
    const ringOld   = document.getElementById('ringOld');
    const ringNew   = document.getElementById('ringNew');
    const scoreNum  = document.getElementById('scoreNum');
    const C = 565;

    if (isFirst) {
        // First analysis: particles → score counts up
        const color = sc(latest.overall);
        ringOld.style.stroke = color;
        document.getElementById('scoreHeroGlow').style.background =
            `radial-gradient(ellipse 80% 60% at 50% 50%, ${color}22 0%, transparent 70%)`;
        document.getElementById('scoreHeroGlow').style.opacity = '1';

        setTimeout(() => {
            launchParticles(color, isFirst);
            setTimeout(() => {
                ringOld.style.strokeDashoffset = C - (latest.overall / 10) * C;
                countUp(scoreNum, 0, latest.overall, 2000);
            }, 800);
        }, 400);

    } else if (justAnalysed) {
        // Subsequent analysis: show old score, then animate to new
        const oldColor = sc(prev.overall);
        const newColor = sc(latest.overall);

        ringOld.style.stroke = oldColor;
        ringOld.style.strokeDashoffset = C - (prev.overall / 10) * C;
        ringOld.style.transition = 'none';
        scoreNum.textContent    = prev.overall.toFixed(3);
        scoreNum.style.color    = oldColor;

        document.getElementById('scoreHeroGlow').style.background =
            `radial-gradient(ellipse 80% 60% at 50% 50%, ${oldColor}20 0%, transparent 70%)`;
        document.getElementById('scoreHeroGlow').style.opacity = '1';

        setTimeout(() => {
            launchParticles(didImprove ? newColor : oldColor, false);
            setTimeout(() => {
                // Transition ring to new score
                ringOld.style.transition = 'stroke-dashoffset 1.8s cubic-bezier(.4,0,.2,1)';
                ringOld.style.stroke     = newColor;
                ringOld.style.strokeDashoffset = C - (latest.overall / 10) * C;

                // Count score number up/down
                countUp(scoreNum, prev.overall, latest.overall, 2000);
                scoreNum.style.color = newColor;

                document.getElementById('scoreHeroGlow').style.background =
                    `radial-gradient(ellipse 80% 60% at 50% 50%, ${newColor}22 0%, transparent 70%)`;

                // Show compare strip after animation
                setTimeout(() => {
                    const cs = document.getElementById('compareStrip');
                    if (cs) {
                        cs.style.transition = 'opacity .6s ease, transform .6s ease';
                        cs.style.opacity = '1';
                        cs.style.transform = 'translateY(0)';
                    }
                    // Show no-improve message if needed
                    if (!didImprove) {
                        const ni = document.getElementById('noImprove');
                        if (ni) ni.style.display = 'block';
                    }
                }, 2200);
            }, 900);
        }, 500);

    } else {
        // Returning visit — show static current score
        const color = sc(latest.overall);
        ringOld.style.stroke = color;
        ringOld.style.transition = 'none';
        setTimeout(() => {
            ringOld.style.transition = 'stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1)';
            ringOld.style.strokeDashoffset = C - (latest.overall / 10) * C;
            countUp(scoreNum, 0, latest.overall, 1400);
            scoreNum.style.color = color;
        }, 300);

        document.getElementById('scoreHeroGlow').style.background =
            `radial-gradient(ellipse 80% 60% at 50% 50%, ${color}20 0%, transparent 70%)`;
        document.getElementById('scoreHeroGlow').style.opacity = '1';

        if (prev) {
            setTimeout(() => {
                const cs = document.getElementById('compareStrip');
                if (cs) { cs.style.opacity = '1'; cs.style.transform = 'translateY(0)'; }
            }, 1800);
        }
    }
});

// ─── BUILDERS ────────────────────────────────────────────────────────────
function buildEmpty() {
    return `<div style="text-align:center;padding:80px 20px;">
        <div style="font-size:48px;margin-bottom:20px;">📊</div>
        <div style="font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:10px;">No analyses yet</div>
        <div style="font-size:14px;color:rgba(255,255,255,0.38);margin-bottom:32px;line-height:1.6;">Run your first analysis to see your dashboard.</div>
        <a href="app.html" style="display:inline-block;padding:14px 36px;border-radius:14px;background:#fff;color:#000;font-size:15px;font-weight:700;text-decoration:none;">Start Analysis</a>
    </div>`;
}

function buildScoreHero(latest, prev, delta, didImprove, isFirst, sc) {
    const color  = sc(latest.overall);
    const C      = 565;
    const hasPrev = prev !== null;

    const deltaStr  = delta > 0 ? '+' + delta.toFixed(3) : delta.toFixed(3);
    const deltaColor = delta > 0 ? '#30d158' : delta < 0 ? '#ff453a' : '#ff9f0a';

    const compareStrip = hasPrev ? `
        <div id="compareStrip" style="opacity:0;transform:translateY(10px);transition:none;">
            <div class="compare-strip">
                <div class="cmp-block">
                    <div class="cmp-label">Previous</div>
                    <div class="cmp-val" style="color:rgba(255,255,255,0.4);">${prev.overall.toFixed(3)}</div>
                </div>
                <div class="cmp-arrow">→</div>
                <div class="cmp-block">
                    <div class="cmp-label">Current</div>
                    <div class="cmp-val" style="color:${color};">${latest.overall.toFixed(3)}</div>
                </div>
                <div style="width:1px;height:40px;background:var(--border);"></div>
                <div class="cmp-delta">
                    <div class="cmp-delta-val" style="color:${deltaColor};">${deltaStr}</div>
                    <div class="cmp-delta-label">Change</div>
                </div>
            </div>
        </div>` : '';

    const noImprove = hasPrev && !didImprove ? `
        <div id="noImprove" class="no-improve">
            You didn't improve yet — but that's fine! 💪<br>
            <span style="font-size:12px;">Check your fix guide below and keep working on it.</span>
        </div>` : '';

    return `
    <div class="fade-up d1">
        <div class="sec-label">Your Dashboard</div>
        <div class="action-row">
            <a href="app.html" class="action-btn action-primary">+ New Analysis</a>
            <a href="home.html" class="action-btn action-secondary">← Home</a>
        </div>
    </div>

    <div class="card fade-up d2 score-hero" style="margin-bottom:14px;">
        <canvas id="particleCanvas"></canvas>
        <div id="scoreHeroGlow" class="score-hero-glow"></div>

        <div style="position:relative;z-index:1;">
            <div class="sec-label" style="margin-bottom:18px;">${isFirst ? 'Your First Score' : 'Latest Score'}</div>

            <div class="score-ring-wrap">
                <svg viewBox="0 0 180 180">
                    <circle class="ring-bg" cx="90" cy="90" r="90"/>
                    <circle class="ring-old" id="ringOld" cx="90" cy="90" r="90"
                        stroke-dasharray="${C}" stroke-dashoffset="${C}"/>
                </svg>
                <div class="ring-center">
                    <div class="score-num-big" id="scoreNum" style="color:${color};">--</div>
                    <div class="score-denom">/ 10</div>
                </div>
            </div>

            <div class="score-label-big" style="color:${color};">${latest.rating?.label || '--'}</div>
            <div class="score-pct" style="color:${color};">${latest.rating?.pct || ''}</div>
            <div class="score-tip">${latest.rating?.tooltip || ''}</div>

            ${compareStrip}
            ${noImprove}
        </div>
    </div>`;
}

function buildImprovedCarousel(improved, sc) {
    if (!improved.length) return '';
    const slides = improved.map(f => {
        const d = '+' + f.d.toFixed(3);
        return `<div class="carousel-slide">
            <div class="slide-feature" style="color:${sc(f.nv)};">${f.name}</div>
            <div class="slide-scores">
                <div class="slide-old">${f.pv.toFixed(1)}</div>
                <div class="slide-arrow">→</div>
                <div class="slide-new" style="color:${sc(f.nv)};">${f.nv.toFixed(1)}</div>
            </div>
            <span class="slide-delta up">${d}</span>
        </div>`;
    }).join('');

    const dots = improved.map((_, i) =>
        `<div class="carousel-dot${i===0?' active':''}" data-i="${i}"></div>`
    ).join('');

    return `<div class="card fade-up d3" style="margin-bottom:14px;">
        <div class="sec-label" style="margin-bottom:16px;">What You Improved 🎉</div>
        <div class="carousel-wrap">
            <div class="carousel-track" id="carouselTrack">${slides}</div>
        </div>
        <div class="carousel-dots" id="carouselDots">${dots}</div>
    </div>`;
}

function buildComposites(latest, sc) {
    const comps = [
        ['HARM', 'Harmony', '32% — ratios & proportions', latest.scores.HARM],
        ['MISC', 'Misc Features', '26% — eyes, nose, lips, EME', latest.scores.MISC],
        ['ANGU', 'Angularity', '22% — jaw, zygo, gonion', latest.scores.ANGU],
        [latest.gender === 'female' ? 'NEOT' : 'DIMO', latest.gender === 'female' ? 'Neoteny' : 'Dimorphism', '20% — dimorphism / neoteny', latest.scores.DIMO],
    ];
    const cards = comps.map(([k, name, desc, v]) => {
        const cv = Math.min(10, Math.max(0, v ?? 0));
        return `<div class="comp-card">
            <div class="comp-top">
                <div class="comp-name">${k} — ${name}</div>
                <div class="comp-val" style="color:${sc(cv)};">${cv.toFixed(2)}</div>
            </div>
            <div class="comp-bar-bg">
                <div class="comp-bar-fill" style="width:0%;background:${sc(cv)};" data-w="${cv*10}"></div>
            </div>
            <div class="comp-desc">${desc}</div>
        </div>`;
    }).join('');

    return `<div class="card fade-up d4" style="margin-bottom:14px;">
        <div class="sec-label" style="margin-bottom:14px;">Composite Breakdown</div>
        <div class="comp-grid">${cards}</div>
    </div>`;
}

function buildFixGuide(fixItems, sc) {
    if (!fixItems.length) return '';

    // Pull fix text from LOOKSMAX_KB if available
    const KB = window.LOOKSMAX_KB || {};
    const items = fixItems.map(f => {
        const kb = KB[f.k];
        let content = '';
        if (kb) {
            if (kb.why)    content += kb.why + '\n\n';
            if (kb.diet?.length)    content += '🥗 DIET & SUPPLEMENTS\n' + kb.diet.map(i => '• ' + i.label + ': ' + i.detail).join('\n') + '\n\n';
            if (kb.softmax?.length) content += '✦ SOFTMAX\n' + kb.softmax.map(i => '• ' + i.label + ': ' + i.detail).join('\n') + '\n\n';
            if (kb.medmax?.length)  content += '⚕ MEDMAX\n' + kb.medmax.map(i => '• ' + i.label + ': ' + i.detail).join('\n') + '\n\n';
            if (kb.hardmax?.length) content += '⚡ HARDMAX\n' + kb.hardmax.map(i => '• ' + i.label + ': ' + i.detail).join('\n');
        } else {
            content = 'See your analysis results for detailed improvement options.';
        }
        return `<div class="fix-item">
            <div class="fix-header">
                <div class="fix-left">
                    <div class="fix-score-badge" style="color:${sc(f.v)};">${f.v.toFixed(1)}</div>
                    <div class="fix-name">${f.name}</div>
                </div>
                <div class="fix-chevron">▼</div>
            </div>
            <div class="fix-body">
                <div class="fix-content">${content.trim()}</div>
            </div>
        </div>`;
    }).join('');

    return `<div class="card fade-up d5" style="margin-bottom:14px;">
        <div class="sec-label" style="margin-bottom:14px;">Your Fix Guide</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:16px;line-height:1.5;">
            Features sorted worst → best. Tap any to expand the full improvement guide.
        </div>
        ${items}
    </div>`;
}

function buildHistory(results, sc) {
    if (results.length < 2) return '';
    const items = results.map((r, i) => {
        const d = new Date(r.date).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
        const t = new Date(r.date).toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
        return `<div class="hist-item">
            <div class="hist-score" style="color:${sc(r.overall)};">${r.overall.toFixed(3)}</div>
            <div class="hist-info">
                <div class="hist-label" style="color:${sc(r.overall)};">${r.rating?.label || '—'}</div>
                <div class="hist-meta">${r.gender} · ${d} at ${t}</div>
            </div>
            <div class="hist-num">#${results.length - i}</div>
        </div>`;
    }).join('');

    return `<div class="card fade-up d6" style="margin-bottom:14px;">
        <div class="sec-label" style="margin-bottom:14px;">Analysis History</div>
        ${items}
    </div>`;
}

// ─── UTILITIES ───────────────────────────────────────────────────────────
function countUp(el, from, to, duration) {
    const start = Date.now();
    const tick  = () => {
        const t    = Math.min(1, (Date.now() - start) / duration);
        const ease = t < .5 ? 2*t*t : -1 + (4 - 2*t)*t;
        el.textContent = (from + (to - from) * ease).toFixed(3);
        if (t < 1) requestAnimationFrame(tick);
        else el.textContent = to.toFixed(3);
    };
    requestAnimationFrame(tick);
}

function launchParticles(color, burst) {
    const canvas = document.getElementById('particleCanvas');
    if (!canvas) return;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width  = rect.width;
    canvas.height = rect.height;
    const ctx = canvas.getContext('2d');

    // Parse color to rgba
    const hex = color.replace('#','');
    const r = parseInt(hex.slice(0,2),16);
    const g = parseInt(hex.slice(2,4),16);
    const b = parseInt(hex.slice(4,6),16);

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const count = burst ? 80 : 60;

    const particles = Array.from({length: count}, () => ({
        x: burst
            ? (Math.random() * canvas.width)
            : (Math.random() * canvas.width),
        y: burst
            ? (Math.random() * canvas.height)
            : (Math.random() < .5 ? 0 : canvas.height),
        size: Math.random() * 3 + 1,
        speedX: (Math.random() - .5) * (burst ? 3 : 2),
        speedY: burst
            ? (Math.random() - .5) * 3
            : ((cy - (Math.random() * canvas.height)) * .02),
        life: 1,
        decay: Math.random() * .008 + .004,
        // Target: center of ring
        tx: cx + (Math.random() - .5) * 20,
        ty: cy + (Math.random() - .5) * 20,
    }));

    let frame = 0;
    const animate = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        particles.forEach(p => {
            if (p.life <= 0) return;
            alive = true;
            // Pull toward target
            p.x += (p.tx - p.x) * .03 + p.speedX * .3;
            p.y += (p.ty - p.y) * .03 + p.speedY * .3;
            p.life -= p.decay;
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.shadowColor = `rgb(${r},${g},${b})`;
            ctx.shadowBlur  = 6;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });
        frame++;
        if (alive && frame < 300) requestAnimationFrame(animate);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
    };
    animate();
}

function initCarousel() {
    const track = document.getElementById('carouselTrack');
    const dots  = document.querySelectorAll('.carousel-dot');
    if (!track) return;

    const slides = track.querySelectorAll('.carousel-slide');
    const total  = slides.length;
    let cur = 0;

    const go = (i) => {
        cur = (i + total) % total;
        const slideW = slides[0].offsetWidth + 12;
        track.style.transform = `translateX(-${cur * slideW}px)`;
        dots.forEach((d, j) => d.classList.toggle('active', j === cur));
    };

    dots.forEach((d, i) => d.addEventListener('click', () => go(i)));

    // Auto advance
    let timer = setInterval(() => go(cur + 1), 3200);
    track.addEventListener('touchstart', () => clearInterval(timer), {passive:true});

    // Swipe support
    let sx = 0;
    track.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, {passive:true});
    track.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - sx;
        if (Math.abs(dx) > 40) { go(cur + (dx < 0 ? 1 : -1)); }
    });
}
