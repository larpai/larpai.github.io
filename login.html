<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — larp.ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --bg:#060608;--bg2:#0d0d10;
            --card:rgba(255,255,255,0.03);--card-border:rgba(255,255,255,0.08);
            --text:#f0f0f2;--text2:rgba(240,240,242,0.55);--text3:rgba(240,240,242,0.28);
            --accent:#30d158;--nav-bg:rgba(6,6,8,0.9);
            --input-bg:rgba(255,255,255,0.05);--input-border:rgba(255,255,255,0.1);
            --btn-bg:#f0f0f2;--btn-text:#060608;
        }
        [data-theme="light"]{
            --bg:#f5f5f0;--bg2:#ebebE6;
            --card:rgba(0,0,0,0.03);--card-border:rgba(0,0,0,0.09);
            --text:#0a0a0c;--text2:rgba(10,10,12,0.55);--text3:rgba(10,10,12,0.3);
            --accent:#1a8c38;--nav-bg:rgba(245,245,240,0.9);
            --input-bg:rgba(0,0,0,0.04);--input-border:rgba(0,0,0,0.12);
            --btn-bg:#0a0a0c;--btn-text:#f5f5f0;
        }
        body{
            font-family:'DM Sans',system-ui,sans-serif;
            background:var(--bg);color:var(--text);
            min-height:100vh;display:flex;flex-direction:column;
            transition:background 0.3s ease,color 0.3s ease;
        }
        body::before{
            content:'';position:fixed;inset:0;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity:0.025;pointer-events:none;z-index:0;
        }

        /* Grid lines */
        .bg-grid{
            position:fixed;inset:0;
            background-image:linear-gradient(var(--card-border) 1px,transparent 1px),linear-gradient(90deg,var(--card-border) 1px,transparent 1px);
            background-size:60px 60px;
            mask-image:radial-gradient(ellipse 60% 80% at 50% 0%,black 0%,transparent 70%);
            -webkit-mask-image:radial-gradient(ellipse 60% 80% at 50% 0%,black 0%,transparent 70%);
            pointer-events:none;z-index:0;
        }

        .topbar{
            position:relative;z-index:10;
            padding:0 clamp(16px,4vw,32px);height:60px;
            display:flex;align-items:center;justify-content:space-between;
            background:var(--nav-bg);
            backdrop-filter:blur(20px);
            border-bottom:1px solid var(--card-border);
        }
        .topbar-brand{
            font-family:'Syne',sans-serif;font-size:17px;font-weight:800;
            letter-spacing:-.04em;color:var(--text);text-decoration:none;
            display:flex;align-items:center;gap:6px;
        }
        .brand-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
        .topbar-brand em{font-family:'DM Sans',sans-serif;font-weight:300;font-style:italic;color:var(--text3);font-size:11px;}
        .topbar-back{
            font-size:13px;color:var(--text2);text-decoration:none;
            display:flex;align-items:center;gap:6px;
            transition:color 0.2s ease;
        }
        .topbar-back:hover{color:var(--text);}

        .center{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1;}

        /* Glow behind card */
        .card-glow{
            position:absolute;width:400px;height:400px;
            background:radial-gradient(circle,rgba(48,209,88,0.07) 0%,transparent 70%);
            border-radius:50%;pointer-events:none;
            top:50%;left:50%;transform:translate(-50%,-60%);
        }
        [data-theme="light"] .card-glow{background:radial-gradient(circle,rgba(26,140,56,0.05) 0%,transparent 70%);}

        @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        .card{
            background:var(--bg2);
            border:1px solid var(--card-border);
            border-radius:24px;padding:44px 40px;
            width:100%;max-width:420px;
            box-shadow:0 32px 80px rgba(0,0,0,0.4);
            animation:fadeUp 0.45s cubic-bezier(0.4,0,0.2,1);
            position:relative;
        }
        [data-theme="light"] .card{box-shadow:0 32px 80px rgba(0,0,0,0.08);}
        .card-top{margin-bottom:28px;}
        .card-icon-wrap{
            width:52px;height:52px;border-radius:14px;
            background:linear-gradient(135deg,rgba(48,209,88,0.15),rgba(48,209,88,0.05));
            border:1px solid rgba(48,209,88,0.2);
            display:flex;align-items:center;justify-content:center;
            font-size:22px;margin-bottom:20px;
        }
        [data-theme="light"] .card-icon-wrap{background:linear-gradient(135deg,rgba(26,140,56,0.12),rgba(26,140,56,0.04));border-color:rgba(26,140,56,0.18);}
        .card-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.04em;margin-bottom:6px;}
        .card-sub{font-size:14px;color:var(--text2);line-height:1.6;font-weight:300;}

        .field{margin-bottom:14px;}
        .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
        .field input{
            width:100%;padding:13px 16px;
            border-radius:12px;
            background:var(--input-bg);
            border:1px solid var(--input-border);
            color:var(--text);
            font-size:15px;font-family:inherit;
            transition:all 0.2s ease;outline:none;
        }
        .field input:focus{
            border-color:var(--accent);
            background:rgba(48,209,88,0.04);
            box-shadow:0 0 0 3px rgba(48,209,88,0.1);
        }
        [data-theme="light"] .field input:focus{background:rgba(26,140,56,0.04);box-shadow:0 0 0 3px rgba(26,140,56,0.1);}
        .field input::placeholder{color:var(--text3);}

        .error-box{background:rgba(255,69,58,0.08);border:1px solid rgba(255,69,58,0.25);border-radius:10px;padding:11px 14px;font-size:13px;color:#ff453a;margin-bottom:16px;display:none;}

        .submit-btn{
            width:100%;padding:14px;border-radius:13px;border:none;
            background:var(--btn-bg);color:var(--btn-text);
            font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;
            margin-top:6px;
            transition:all 0.2s ease;letter-spacing:-.01em;
            position:relative;overflow:hidden;
        }
        .submit-btn::after{
            content:'';position:absolute;inset:0;
            background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.08) 100%);
            opacity:0;transition:opacity 0.2s;
        }
        .submit-btn:hover::after{opacity:1;}
        .submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,0.2);}
        [data-theme="light"] .submit-btn:hover{box-shadow:0 8px 24px rgba(0,0,0,0.1);}
        .submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

        .divider{height:1px;background:var(--card-border);margin:24px 0;}
        .switch{text-align:center;font-size:13px;color:var(--text3);}
        .switch a{color:var(--text2);text-decoration:none;font-weight:600;transition:color 0.15s;}
        .switch a:hover{color:var(--text);}

        @media(max-width:480px){.card{padding:32px 22px;}.topbar{padding:0 16px;}}
    </style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
    <a href="home.html" class="topbar-brand">
        <span class="brand-dot"></span>
        larp.ai <em>v4.4</em>
    </a>
    <a href="home.html" class="topbar-back">← Back</a>
</div>

<div class="center">
    <div class="card-glow"></div>
    <div class="card">
        <div class="card-top">
            <div class="card-icon-wrap">👤</div>
            <div class="card-title">Welcome back</div>
            <div class="card-sub">Log in to access your results and track your facial improvement journey.</div>
        </div>

        <div class="error-box" id="errorBox"></div>

        <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
        </div>

        <button class="submit-btn" id="loginBtn">Log In</button>

        <div class="divider"></div>
        <div class="switch">No account? <a href="signup.html">Sign up free</a></div>
    </div>
</div>

<script src="auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // Apply saved theme
    const t = localStorage.getItem('larp_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);

    const auth = window.LarpAuth;
    if (auth.isLoggedIn()) { window.location.href = 'home.html'; return; }

    const emailEl = document.getElementById('email');
    const passEl  = document.getElementById('password');
    const btn     = document.getElementById('loginBtn');
    const errBox  = document.getElementById('errorBox');

    const showErr = msg => { errBox.textContent = msg; errBox.style.display = 'block'; };
    const hideErr = ()  => { errBox.style.display = 'none'; };

    const doLogin = () => {
        hideErr();
        const email = emailEl.value.trim();
        const pass  = passEl.value;
        if (!email || !pass) { showErr('Please fill in all fields.'); return; }
        btn.disabled = true; btn.textContent = 'Logging in...';
        setTimeout(() => {
            const res = auth.login(email, pass);
            if (res.ok) {
                sessionStorage.setItem('larp_login_success', res.name.split(' ')[0]);
                window.location.href = 'home.html';
            } else {
                showErr(res.error);
                btn.disabled = false; btn.textContent = 'Log In';
            }
        }, 300);
    };

    btn.addEventListener('click', doLogin);
    passEl.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
    emailEl.addEventListener('keydown', e => { if(e.key==='Enter') passEl.focus(); });
});
</script>
</body>
</html>
